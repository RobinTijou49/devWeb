name: Deploy Vue.js to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      # Copier le dist depuis le runner vers le VPS
      - name: Copy build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22
          source: 'dist/*'
          target: '/tmp/vue-deploy'
          strip_components: 1 # supprime le préfixe "dist/" à la copie

      # Déployer sur le VPS
      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22
          script: |
            rm -rf /var/www/vue-app/*
            cp -r /tmp/vue-deploy/* /var/www/vue-app/
            sudo chown -R www-data:www-data /var/www/vue-app
            sudo systemctl restart nginx
            rm -rf /tmp/vue-deploy
